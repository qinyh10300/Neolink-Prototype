<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>NeoLink · Agent 待机</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #ececec;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 0;
  }
  .phone {
    width: 360px; height: 760px;
    background: #fff;
    border-radius: 42px;
    border: 2px solid #1f1f1f;
    padding: 14px;
    position: relative;
    box-shadow: 0 30px 60px rgba(0,0,0,0.08);
  }
  .notch {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 22px;
    background: #1f1f1f;
    border-radius: 0 0 14px 14px;
    display: flex; align-items: center; justify-content: center;
    gap: 28px;
  }
  .notch::before { content: ""; width: 38px; height: 5px; background: #444; border-radius: 4px; }
  .notch::after  { content: ""; width: 8px;  height: 8px; background: #333; border-radius: 50%; }
  .screen {
    width: 100%; height: 100%;
    border-radius: 30px;
    display: flex; flex-direction: column;
    padding-top: 36px;
    overflow: hidden;
  }
  .brand {
    font-family: 'Dancing Script', cursive;
    font-size: 44px;
    text-align: center;
    margin: 10px 0 0;
    color: #111;
  }
  .prompts {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    padding-top: 30px;
  }
  .prompts .line {
    font-size: 14px;
    color: #cfcfcf;
    text-align: center;
  }
  .prompts .line.mid {
    color: #a8a8a8;
  }
  .prompts .line.main {
    font-size: 20px;
    color: #111;
    font-weight: 600;
  }
  .orb {
    width: 110px; height: 110px;
    margin: 10px auto 30px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #4a6c8a 0%, #1a3b56 35%, #0b1a2c 70%, #050b16 100%);
    box-shadow:
      inset -10px -16px 32px rgba(0,0,0,0.55),
      inset 12px 14px 24px rgba(120,180,200,0.18),
      0 12px 30px rgba(20,40,70,0.25);
    position: relative;
  }
  .orb::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 60% 80%, rgba(60,140,120,0.35), transparent 45%),
      radial-gradient(circle at 25% 65%, rgba(80,90,160,0.35), transparent 50%);
    mix-blend-mode: screen;
  }
  .tabbar {
    height: 56px;
    border-top: 1px solid #f0f0f0;
    display: flex;
  }
  .tab {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    font-size: 10px;
    color: #b9b9b9;
  }
  .tab.active { color: #2f9466; }
  .tab .icon { font-size: 18px; }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <div class="brand">Neolink</div>
      <div class="prompts">
        <div class="line">What are some of your hobbies?</div>
        <div class="line mid">Tell me about something you love</div>
        <div class="line main">Hello, how was your day?</div>
        <div class="line mid">Tell me about something you love</div>
        <div class="line">What are some of your hobbies?</div>
      </div>
      <div class="orb"></div>
      <div class="tabbar">
        <div class="tab active"><span class="icon">⌂</span><span>首页</span></div>
        <div class="tab"><span class="icon">○</span><span>消息</span></div>
        <div class="tab"><span class="icon">◔</span><span>我的</span></div>
      </div>
    </div>
  </div>
</body>
</html>
