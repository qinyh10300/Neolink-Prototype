<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>NeoLink · iMessage 聊天</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #ececec;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 0;
  }
  .phone {
    width: 360px; height: 760px;
    background: #fff;
    border-radius: 42px;
    border: 2px solid #1f1f1f;
    padding: 14px;
    position: relative;
    box-shadow: 0 30px 60px rgba(0,0,0,0.08);
  }
  .notch {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 22px;
    background: #1f1f1f;
    border-radius: 0 0 14px 14px;
    display: flex; align-items: center; justify-content: center;
    gap: 28px;
  }
  .notch::before { content: ""; width: 38px; height: 5px; background: #444; border-radius: 4px; }
  .notch::after  { content: ""; width: 8px;  height: 8px; background: #333; border-radius: 50%; }
  .screen {
    width: 100%; height: 100%;
    border-radius: 30px;
    display: flex; flex-direction: column;
    padding-top: 28px;
    overflow: hidden;
    background: #fff;
  }
  .statusbar {
    display: flex; justify-content: space-between;
    padding: 4px 22px 2px;
    font-size: 12px;
    color: #111;
    font-weight: 500;
  }
  .header {
    display: flex; align-items: center;
    padding: 4px 14px 10px;
    border-bottom: 1px solid #f0f0f0;
    position: relative;
  }
  .back { color: #1e8aff; font-size: 22px; width: 30px; }
  .video { color: #1e8aff; font-size: 18px; margin-left: auto; }
  .contact {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    font-size: 11px; color: #444;
  }
  .contact .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #f3c5a5;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 2px;
    position: relative;
    overflow: hidden;
  }
  .contact .avatar::before {
    content: "";
    width: 14px; height: 6px;
    background: #f5d569;
    border-radius: 7px;
    position: absolute;
    top: 10px;
    box-shadow: 0 0 0 1px #333;
  }
  .contact .avatar::after {
    content: "";
    width: 16px; height: 5px;
    background: #2a2a2a;
    border-radius: 0 0 8px 8px;
    position: absolute;
    top: 4px;
  }
  .contact span.name { display: flex; align-items: center; gap: 2px; }
  .messages {
    flex: 1;
    padding: 14px 14px 4px;
    display: flex; flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  .row { display: flex; }
  .row.left { justify-content: flex-start; }
  .row.right { justify-content: flex-end; }
  .bubble {
    max-width: 75%;
    padding: 9px 13px;
    font-size: 13px;
    line-height: 1.4;
    border-radius: 18px;
  }
  .bubble.left  { background: #ececec; color: #111; }
  .bubble.right { background: #1e8aff; color: #fff; }
  .card {
    background: #ececec;
    border-radius: 14px;
    padding: 8px;
    display: flex; align-items: center;
    gap: 8px;
    width: 220px;
  }
  .card .cover {
    width: 44px; height: 44px;
    border-radius: 8px;
    background: linear-gradient(135deg, #1e2c4f, #0a172e);
    position: relative;
    overflow: hidden;
  }
  .card .cover::after {
    content: "▶";
    color: #fff; font-size: 12px;
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .card .info { flex: 1; font-size: 12px; line-height: 1.3; }
  .card .info .title { font-weight: 600; color: #111; }
  .card .info .sub { color: #666; font-size: 11px; }
  .card .play {
    width: 26px; height: 26px; border-radius: 50%;
    background: #ff3b30; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .delivered { font-size: 10px; color: #999; text-align: right; padding: 2px 4px 0; }
  .input-row {
    display: flex; align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-top: 1px solid #f0f0f0;
  }
  .circle-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #ececec;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: #555;
    flex-shrink: 0;
  }
  .imessage {
    flex: 1;
    height: 30px;
    border: 1px solid #ddd;
    border-radius: 16px;
    display: flex; align-items: center;
    padding: 0 12px;
    font-size: 12px;
    color: #b6b6b6;
    justify-content: space-between;
  }
  .app-row {
    display: flex; gap: 10px;
    padding: 6px 14px 4px;
  }
  .app-row .dot {
    width: 26px; height: 26px;
    border-radius: 50%;
  }
  .app-row .dot:nth-child(1) { background: conic-gradient(#ff3b30, #ffcc00, #34c759, #007aff, #af52de, #ff3b30); }
  .app-row .dot:nth-child(2) { background: linear-gradient(135deg, #1e8aff, #003c8f); }
  .app-row .dot:nth-child(3) { background: linear-gradient(135deg, #ff2a68, #ff8c00); }
  .app-row .dot:nth-child(4) { background: #1f1f1f; }
  .app-row .dot:nth-child(5) { background: linear-gradient(135deg, #b76b40, #f3c5a5); }
  .app-row .dot:nth-child(6) { background: linear-gradient(135deg, #d23a3a, #6b2a2a); }
  .app-row .dot:nth-child(7) { background: linear-gradient(135deg, #ff3b30, #ffcc00); }
  .keyboard {
    background: #cfd2d8;
    padding: 6px 4px 8px;
    display: flex; flex-direction: column;
    gap: 6px;
  }
  .krow { display: flex; justify-content: center; gap: 4px; }
  .key {
    flex: 1;
    max-width: 30px;
    height: 32px;
    background: #fff;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: #111;
    box-shadow: 0 1px 0 rgba(0,0,0,0.25);
  }
  .key.wide  { max-width: 44px; }
  .key.dark  { background: #adb2bc; color: #111; }
  .key.space { max-width: 140px; flex: 2; }
  .home-indicator {
    width: 110px; height: 4px;
    background: #1f1f1f;
    border-radius: 2px;
    margin: 4px auto 4px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <div class="statusbar">
        <span>12:12</span>
        <span>•••• 📶 🔋</span>
      </div>
      <div class="header">
        <div class="back">‹</div>
        <div class="contact">
          <div class="avatar"></div>
          <span class="name">Pooya ›</span>
        </div>
        <div class="video">📷</div>
      </div>
      <div class="messages">
        <div class="row left"><div class="bubble left">Hi! I went shopping today and founf the earrings you've been looking for.</div></div>
        <div class="row left"><div class="bubble left">I got them for you. my treat!</div></div>
        <div class="row right">
          <div class="card">
            <div class="cover"></div>
            <div class="info">
              <div class="title">Chi Shenidi?</div>
              <div class="title">(feat. Hichkas)</div>
              <div class="sub">Fadaei</div>
              <div class="sub">🎵 Music</div>
            </div>
            <div class="play">▶</div>
          </div>
        </div>
        <div class="delivered">Delivered</div>
      </div>
      <div class="input-row">
        <div class="circle-btn">📷</div>
        <div class="circle-btn">A</div>
        <div class="imessage"><span>iMessage</span><span>🎙</span></div>
      </div>
      <div class="app-row">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="keyboard">
        <div class="krow">
          <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div>
          <div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
        </div>
        <div class="krow">
          <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div>
          <div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div>
        </div>
        <div class="krow">
          <div class="key dark wide">⇧</div>
          <div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div>
          <div class="key">B</div><div class="key">N</div><div class="key">M</div>
          <div class="key dark wide">⌫</div>
        </div>
        <div class="krow">
          <div class="key dark wide">123</div>
          <div class="key">🌐</div>
          <div class="key space">space</div>
          <div class="key dark wide">return</div>
        </div>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
